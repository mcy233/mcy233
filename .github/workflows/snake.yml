name: Generate contribution snake

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

# Allow Actions in repo Settings; GITHUB_TOKEN needs contents: write for commits.
permissions:
  contents: write

concurrency:
  group: snake-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: Platane/snk@v3
        with:
          github_user_name: mcy233
          outputs: |
            output/github-contribution-grid-snake.svg?palette=github-dark
            output/github-contribution-grid-snake.gif?palette=github-dark

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update contribution snake [skip ci]"
          file_pattern: output/*

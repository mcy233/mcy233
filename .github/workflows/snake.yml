name: Generate contribution snake

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

# 需在仓库 Settings → Actions → General 中允许 Actions，且默认 GITHUB_TOKEN 可写入内容
permissions:
  contents: write

concurrency:
  group: snake-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: Platane/snk@v3
        with:
          github_user_name: mcy233
          outputs: |
            output/github-contribution-grid-snake.svg

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update contribution snake [skip ci]"
          file_pattern: output/*.svg
